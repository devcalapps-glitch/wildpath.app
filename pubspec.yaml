name: wildpath
description: WildPath — Camping Trip Planner
publish_to: 'none'
version: 3.1.1+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  http: ^1.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.2
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  uuid: ^4.3.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^17.2.1
  workmanager: ^0.9.0
  timezone: ^0.9.4
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  flutter_pdfview: ^1.4.4
  path: ^1.9.0
  share_plus: ^10.0.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#E87B2C"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
